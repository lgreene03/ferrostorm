# Mobile Construction Vehicle - deploys into a Construction Yard, founding
# a new base with the CY's full build radius. Expensive, slow, unarmed.
id: com_mcv
name: "Mobile Construction Vehicle"
faction: common
tier: 2
cost: 3000
build_time_ticks: 400
hp: 600
armour_class: heavy
speed: 15
role: expansion
weapon_ids: []
sight_range: 5
stealth: false
detector: false
produced_at: com_factory
# Under produced_at this prerequisite is a tautology; GDD line 47 wants a Tech
# Centre that does not exist. Resolving it (candidate: the Radar Uplink) is a
# Game Designer decision on file, not this ticket's to make (doc 23 s4.3).
prerequisites: [com_factory]
veterancy_enabled: false
notes: >
  The seed of every base. Deploy consumes the vehicle; there is no
  repacking in the vertical slice.
