notes: >
  The whole defensive roster at present. Anti-armour, so it loses per-cost to
  massed infantry by a hair. GDD s5 says a turret goes offline below 75 per
  cent power, and since ADR-008 the sim enforces exactly that: CombatSystem
  gates turret fire on the pre-combat AtLeast75 tally, so this draw buys the
  gun that fires. The faction key is descriptive: the sim gates only the veil
  projector.
