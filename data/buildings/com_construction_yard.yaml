notes: >
  build_time_ticks 0 is load-bearing, not a placeholder: BuildStructure refuses
  anything with BuildTicks <= 0, which is what keeps the yard MCV-deployed
  rather than queueable. The cost is still real, because CancelProduce and
  SellStructure both price it. Draw 20 is ADR-008 clause 3 (BD-07 rebased,
  Balance + Game Designer A11 co-sign recorded there): the yard is part of the
  opening base's exactly-100-against-100 curve, so the first plant is
  mandatory rather than decorative.
