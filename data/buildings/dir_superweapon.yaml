notes: >
  Charges over 1500 ticks, pausing while the base is underpowered, then throws
  an area strike with five seconds of warning. The charge length is a spawn
  override, not a catalogue value, because scenarios shorten it to test the
  cycle. Draw 150 is ADR-008 clause 3 (A11 co-sign recorded there): with the
  rest of the curve, a full base plus this weapon is a four-plant commitment.
